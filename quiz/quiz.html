<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

  <link rel="stylesheet" href="../css/quiz.css">
</head>

<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="wrapper">

        <div class="main-card">

            <div class="text-center">

                <div class="badge-top">
                    <i class="bi bi-robot"></i>
                    AI Interview Session
                </div>

                <h1 class="title">
                    Interview Practice
                </h1>

                <div class="meta">

                    <div class="meta-pill" id="selectedPosition"></div>

                    <div class="meta-pill" id="selectedLevel"></div>

                </div>

            </div>

            <div class="question-card">

                <div class="question-label">
                    Current Question
                </div>

                <div class="question-text" id="question"></div>

            </div>

            <div class="answer-card">

                <div class="answer-label">
                    Your Answer
                </div>

                <div id="transcript">
                    Start speaking and your answer will appear here...
                </div>

            </div>

            <div class="controls">

                <button class="btn-custom record"
                    onclick="startInterview()">

                    <i class="bi bi-mic-fill"></i>
                    Start Answer

                </button>

                <button class="btn-custom stop"
                    onclick="stopInterview()">

                    <i class="bi bi-stop-fill"></i>
                    Stop

                </button>

                <button class="btn-custom next"
                    onclick="nextQuestion()">

                    <i class="bi bi-arrow-right"></i>
                    Next Question

                </button>

            </div>

            <audio id="player" controls class="w-100 mt-4"></audio>

            <div class="status" id="status">
                Ready for interview...
            </div>

        </div>

    </div>

    <script src="../js/quiz.js"></script>

</body>

</html>
